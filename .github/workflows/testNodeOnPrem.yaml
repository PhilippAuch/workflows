---
name: Run on prem Tests with Node

on:
  workflow_call:
    inputs:
      subfolder:
        required: false
        type: string
        default: "./"
      branch-name:
        required: false
        type: string
        default: ${{ github.ref }}

jobs:
  node-test:
    timeout-minutes: 180
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.branch-name }}
          fetch-depth: "0"

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
          registry-url: "https://npm-repo.auch.ovh"

      - name: Install dependencies
        uses: nick-fields/retry@v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd ${{ inputs.subfolder }} && npm install

      - name: Run build script if present
        uses: nick-fields/retry@v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd ${{ inputs.subfolder }} && npm run build --if-present

      - name: Check all dependencies are needed
        run: cd ${{ inputs.subfolder }} && npx knip --debug

      - name: Check if playwright is used
        id: check_playwright
        uses: andstor/file-existence-action@v3.1.0
        with:
          files: "${{ inputs.subfolder }}playwright.config.ts"

      - name: Install playwright
        if: steps.check_playwright.outputs.files_exists == 'true'
        uses: nick-fields/retry@v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd ${{ inputs.subfolder }} && npx playwright install --with-deps

      - name: Run test
        run: cd ${{ inputs.subfolder }} && npm run test --if-present

      - name: Save playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && steps.check_playwright.outputs.files_exists == 'true' }}
        with:
          name: playwright-report
          path: ${{ inputs.subfolder }}playwright-report/
          retention-days: 3
