---
name: Publish the latest git release

on:
  workflow_call:
    inputs:
      subfolder:
        required: false
        type: string
        default: "./"

jobs:
  publish-release:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: "0"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        id: tagging_dryrun
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          dry_run: true

      # - name: Write version to file
      #   uses: dolittle/write-version-to-file-action@v2.1.2
      #   if: |
      #     ((github.event_name == 'workflow_dispatch' || github.event_name=='push') && github.ref == 'refs/heads/main')
      #   with:
      #     version: "${{ steps.tagging_dryrun.outputs.new_tag }}"
      #     path: ./version.json
      #     user-email: build@githubaction.com
      #     user-name: build-githubaction
      #     merge-strategy: merge

      - uses: devops-actions/json-to-file@v1.0.0
        if: |
          ((github.event_name == 'workflow_dispatch' || github.event_name=='push') && github.ref == 'refs/heads/main')
        with:
          json: "{'version': '${{ steps.tagging_dryrun.outputs.new_tag }}'}"
          filename: "./version.json"

      - uses: EndBug/add-and-commit@v10.0.0
        if: |
          ((github.event_name == 'workflow_dispatch' || github.event_name=='push') && github.ref == 'refs/heads/main')
        with:
          default_author: github_actions
          message: Bump version to ${{ steps.tagging_dryrun.outputs.new_tag }}
          add: "version.json"

      - name: Git pull & push
        if: |
          ((github.event_name == 'workflow_dispatch' || github.event_name=='push') && github.ref == 'refs/heads/main')
        run: |
          git pull
          git push
          git rev-parse main
          git show

      - name: Override GITHUB_ENV with new SHA
        id: vars
        if: |
          ((github.event_name == 'workflow_dispatch' || github.event_name=='push') && github.ref == 'refs/heads/main')
        run: |
          calculatedSha=$(git rev-parse main)
          echo "NEW_SHA=$calculatedSha" >> $GITHUB_ENV

      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        if: |
          ((github.event_name == 'workflow_dispatch' || github.event_name=='push') && github.ref == 'refs/heads/main')
        id: tagging
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commit_sha: ${{ env.NEW_SHA }}
          release_branches: main
          dry_run: false

      - uses: ncipollo/release-action@v1.21.0
        if: |
          ((github.event_name == 'workflow_dispatch' || github.event_name=='push') && github.ref == 'refs/heads/main')
        with:
          commit: "${{ env.NEW_SHA }}"
          generateReleaseNotes: true
          tag: "${{ steps.tagging.outputs.new_tag }}"
